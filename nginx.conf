# HTTPS server - for production with valid SSL certificates
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    
    # Updated to include local and public trial IPs
    server_name  192.168.0.89 197.46.146.110;

    client_max_body_size 100M;

    # 1. ACME challenge (Leave active for when we point the domain)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # 2. Public files access
    location /public/ {
        alias /var/www/html/public/;
        autoindex off;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri $uri/ =404;
    }
    add_header Strict-Transport-Security "max-age=0;" always;
    # 3. BACKEND API Proxy
    # TEMPORARY: Direct proxy to backend via HTTP for Trial/Testing
    # COMMENT OUT the redirect below to enable testing via IP
    # return 301 https://$host$request_uri;
    # Any request starting with /api/ will go to the backend container
    location /api {
        # The trailing slash in 'http://backend:8000/' is critical 
        # it removes the '/api' prefix before sending to node.js
        proxy_pass http://backend:8000; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    # 4. FRONTEND Proxy
    # All other requests will go to the Next.js container
    location / {
        proxy_pass http://modelink-frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

